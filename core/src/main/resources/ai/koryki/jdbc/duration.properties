# Duration unit words for WordedLocaleFormat, keyed <width>.<unit>.<one|other>.
# This is the default (English) bundle; add duration_<lang>.properties for other locales.
wide.year.one=year
wide.year.other=years
wide.month.one=month
wide.month.other=months
wide.day.one=day
wide.day.other=days

short.year.one=yr
short.year.other=yrs
short.month.one=mo
short.month.other=mos
short.day.one=day
short.day.other=days

narrow.year.one=y
narrow.year.other=y
narrow.month.one=mo
narrow.month.other=mo
narrow.day.one=d
narrow.day.other=d
